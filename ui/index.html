<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALARA</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", "SF Pro Text", sans-serif;
      background: transparent;
      color: #fff;
      overflow: hidden;
    }
    .overlay {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      background: rgba(20, 20, 20, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 12px;
    }
    .mic {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.07);
      color: #fff;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
      flex-shrink: 0;
    }
    .mic:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .mic svg { width: 16px; height: 16px; }
    .input-wrap {
      flex: 1;
      min-width: 0;
      position: relative;
    }
    input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 16px;
    }
    input::placeholder { color: rgba(255, 255, 255, 0.55); }
    .status {
      min-width: 170px;
      max-width: 220px;
      text-align: right;
      color: rgba(255, 255, 255, 0.78);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .brand {
      width: 72px;
      height: 22px;
      object-fit: contain;
      flex-shrink: 0;
      opacity: 0.95;
      pointer-events: none;
    }

    .state-listening .mic {
      animation: pulse 1.2s infinite;
      box-shadow: 0 0 16px rgba(255, 64, 64, 0.65);
      border-color: rgba(255, 89, 89, 0.7);
    }

    .state-processing .input-wrap::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(110deg, transparent 30%, rgba(255, 255, 255, 0.12) 50%, transparent 70%);
      animation: shimmer 1.1s infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 rgba(255, 64, 64, 0.3); }
      50% { transform: scale(1.06); box-shadow: 0 0 22px rgba(255, 64, 64, 0.82); }
      100% { transform: scale(1); box-shadow: 0 0 0 rgba(255, 64, 64, 0.3); }
    }

    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to { transform: translateX(100%); }
    }
  </style>
</head>
<body>
  <div id="overlay" class="overlay state-idle">
    <button id="micBtn" class="mic" aria-label="Microphone">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3zm5-3a1 1 0 1 1 2 0 7 7 0 0 1-6 6.92V21h2a1 1 0 1 1 0 2H9a1 1 0 1 1 0-2h2v-2.08A7 7 0 0 1 5 12a1 1 0 1 1 2 0 5 5 0 0 0 10 0z"/>
      </svg>
    </button>

    <div class="input-wrap">
      <input id="commandInput" type="text" placeholder="Say a command or type one..." autocomplete="off" />
    </div>

    <div id="status" class="status">Idle</div>
    <img class="brand" src="./alara.svg" alt="Alara logo" />
  </div>

  <script>
    const overlay = document.getElementById('overlay');
    const micBtn = document.getElementById('micBtn');
    const commandInput = document.getElementById('commandInput');
    const statusEl = document.getElementById('status');

    let state = 'idle';
    let hideTimer = null;

    function setState(nextState) {
      state = nextState;
      overlay.classList.remove('state-idle', 'state-listening', 'state-processing');
      overlay.classList.add(`state-${nextState}`);

      if (nextState === 'idle') {
        micBtn.disabled = false;
        commandInput.placeholder = 'Say a command or type one...';
        statusEl.textContent = 'Idle';
      } else if (nextState === 'listening') {
        micBtn.disabled = false;
        commandInput.placeholder = 'Listening...';
        statusEl.textContent = 'Listening';
      } else {
        micBtn.disabled = true;
        commandInput.placeholder = 'Processing...';
        statusEl.textContent = 'Processing';
      }
    }

    function sendTextCommand() {
      const text = commandInput.value.trim();
      if (!text) return;
      window.alara.send({ type: 'text_command', text });
      setState('processing');
    }

    micBtn.addEventListener('click', () => {
      if (state === 'processing') return;
      const text = commandInput.value.trim();
      if (text) {
        sendTextCommand();
        return;
      }
      if (state === 'idle') {
        window.alara.send({ type: 'start_listening' });
        setState('listening');
      } else if (state === 'listening') {
        window.alara.send({ type: 'stop_listening' });
        setState('idle');
      }
    });

    commandInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        sendTextCommand();
      }
      if (event.key === 'Escape') {
        event.preventDefault();
        window.alara.send({ type: 'hide_overlay' });
      }
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        event.preventDefault();
        window.alara.send({ type: 'hide_overlay' });
      }
    });

    window.alara.onMessage((message) => {
      if (!message || typeof message !== 'object') return;

      if (message.type === 'overlay_shown') {
        commandInput.focus();
        commandInput.select();
        return;
      }

      if (message.type === 'overlay_hidden') {
        commandInput.blur();
        commandInput.value = '';
        clearTimeout(hideTimer);
        setState('idle');
        return;
      }

      if (message.type === 'wake') {
        setState('listening');
        statusEl.textContent = 'Wake detected';
        return;
      }

      if (message.type === 'state') {
        setState(message.state || 'idle');
        return;
      }

      if (message.type === 'result') {
        const ok = message.success ? 'ok' : 'fail';
        statusEl.textContent = `${message.action || 'unknown'} | ${ok} | ${message.message || ''}`;
        setState('idle');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
          commandInput.value = '';
          window.alara.send({ type: 'hide_overlay' });
        }, 2000);
      }
    });
  </script>
</body>
</html>
